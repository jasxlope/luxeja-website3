<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxeja | Accessories</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h1 class="logo">LUXEJA</h1>
            <ul class="nav-links">
                <li><a href="womens.html">Womens</a></li>
                <li><a href="mens.html">Mens</a></li>
                <li><a href="accessories.html" class="active">Accessories</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-search">
                <input type="text" placeholder="Search Luxeja..." id="searchInput" />
                <button onclick="searchSite()">🔍</button>
            </div>
        </nav>
    </header>

    <!-- ACCESSORIES SECTION -->
    <section class="shop-section">
        <h2>Accessories Collection</h2>
        <hr />

        <div class="product-grid">
            <!-- Product Card Example -->
            <div class="product-card">
                <img src="images/accessory1.jpg" alt="Accessory Item 1" />
                <h3>Luxeja Sunglasses</h3>
                <p>$45.00</p>
                <button class="cta">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="images/accessory2.jpg" alt="Accessory Item 2" />
                <h3>Gold Hoop Earrings</h3>
                <p>$35.00</p>
                <button class="cta">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="images/accessory3.jpg" alt="Accessory Item 3" />
                <h3>Designer Tote Bag</h3>
                <p>$120.00</p>
                <button class="cta">Add to Cart</button>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2025 Luxeja. All rights reserved.</p>
    </footer>
</body>

</html>
