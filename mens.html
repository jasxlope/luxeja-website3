<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxeja | Mens</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="header-mark" aria-label="Luxeja home">
                <img src="images/phoenix_logo_lux.png" alt="Luxeja phoenix logo">
            </a>
            <h1 class="logo"><a href="index.html">LUXEJA</a></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="collections.html">Collections</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-search">
                <input type="text" placeholder="Search Luxeja..." id="searchInput" />
                <button onclick="searchSite()" aria-label="Search">Search</button>
            </div>
        </nav>
    </header>

    <!-- MENS SECTION -->
    <section class="offerings-section">
        <div class="offerings-container">
            <h2 class="offerings-title">Mens Collection</h2>
            <div class="offerings-cards">
                <div class="offering-card">
                    <img src="https://via.placeholder.com/300x300" alt="Tank Top">
                    <h3>Tank Top</h3>
                    <p class="price">$28</p>
                </div>
                <div class="offering-card">
                    <img src="https://via.placeholder.com/300x300" alt="Shorts">
                    <h3>Shorts</h3>
                    <p class="price">$40</p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2025 Luxeja. All rights reserved.</p>
    </footer>
    <script src="app.js"></script>
</body>

</html>
